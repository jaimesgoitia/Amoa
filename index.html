<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#EDE9E2">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Amoa">
<title>Amoa</title>
<script>
  // Apply saved theme before first paint to avoid flash
  (function(){
    var t = localStorage.getItem('amoa-theme') || 'light';
    document.documentElement.setAttribute('data-theme', t);
  })();
</script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,1,0" rel="stylesheet">
<style>
/* ─── RESET ──────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{display:none}
*{scrollbar-width:none}
input,button{font-family:inherit;border:none;outline:none;background:none}

/* ─── TOKENS ─────────────────────────────────────── */
:root{
  /* surfaces — modo oscuro: crepúsculo */
  --bg:  #0e1520;
  --s1:  #141d2e;
  --s2:  #1a2640;
  --s3:  #223050;
  /* text */
  --t1: #c8d8f0;
  --t2: #7a9abf;
  --t3: #3a5878;
  --t4: rgba(120,160,220,.06);
  /* borders */
  --b1: rgba(120,160,220,.08);
  --b2: rgba(120,160,220,.15);
  /* semantic */
  --green: #6a9878;
  --red:   #c05848;
  --blue:  #7a9abf;
  --amber: #c8902a;
  /* profiles */
  --casa:     #c8902a; --casa-r:    200,144,42;
  --personal: #6a9878; --personal-r: 106,152,120;
  --pareja:   #e8b860; --pareja-r:  232,184,96;
  --ahorros:  #c8902a; --ahorros-r: 200,144,42;
  /* spacing */
  --r:   16px;
  --rL:  22px;
  --rXL: 28px;
  /* safe areas */
  --st: env(safe-area-inset-top, 0px);
  --sb: env(safe-area-inset-bottom, 0px);
  /* spring curves */
  --spring:   cubic-bezier(.34,1.40,.64,1);
  --spring-s: cubic-bezier(.34,1.20,.64,1);
  --smooth:   cubic-bezier(.25,.46,.45,.94);
  --sharp:    cubic-bezier(.4,0,.2,1);
}

/* ─── LIGHT MODE — paleta sala ───────────────────── */
html[data-theme="light"]{
  --bg:  #EDE9E2;
  --s1:  #F4F0E8;
  --s2:  #E4DED4;
  --s3:  #D8D0C4;
  --t1:  #1E1E1E;
  --t2:  #4A4644;
  --t3:  #9E9488;
  --t4:  rgba(74,70,68,.06);
  --b1:  rgba(74,70,68,.10);
  --b2:  rgba(74,70,68,.17);
  --green: #4a7a2a;
  --red:   #8A2A10;
  --blue:  #4A4644;
  --amber: #C86010;
  --casa:     #4A4644; --casa-r:    74,70,68;
  --personal: #9E9488; --personal-r: 158,148,136;
  --pareja:   #B8B2AA; --pareja-r:  184,178,170;
  --ahorros:  #C86010; --ahorros-r: 200,96,16;
}

/* transición suave al cambiar tema */
html{ background: var(--bg); }
html.theme-transitioning,
html.theme-transitioning *, 
html.theme-transitioning *::before, 
html.theme-transitioning *::after {
  transition: background-color 220ms ease-out,
              border-color 220ms ease-out,
              color 220ms ease-out !important;
}

/* ─── BASE ───────────────────────────────────────── */
html,body{ height:100%; height:-webkit-fill-available; overflow:hidden; background:var(--bg); }
body{
  font-family:'DM Sans',system-ui,sans-serif;
  color:var(--t1);
  -webkit-font-smoothing:antialiased;
  overscroll-behavior:none;
}
.ms{
  font-family:'Material Symbols Rounded';
  font-weight:400; font-style:normal;
  line-height:1; letter-spacing:normal;
  text-transform:none; white-space:nowrap;
  display:inline-flex; align-items:center; justify-content:center;
  user-select:none;
}

/* ─── ONBOARDING ─────────────────────────────────── */
#ob{
  position:fixed;inset:0;z-index:9000;
  background:radial-gradient(ellipse 80% 60% at 50% 20%, rgba(200,144,42,.08) 0%, transparent 70%), var(--bg);
  display:flex;flex-direction:column;align-items:center;
  padding:0 28px calc(36px + var(--sb));
}
.ob-top{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding-top:calc(var(--st) + 60px);width:100%;max-width:380px;
}
.ob-logo-wrap{
  display:flex;flex-direction:column;align-items:center;gap:14px;margin-bottom:40px;
  opacity:0;transform:translateY(24px) scale(.95);
  transition:opacity .5s var(--smooth), transform .5s var(--spring);
}
.ob-logo-wrap.in{opacity:1;transform:none}
.ob-logo-icon{
  width:76px;height:76px;border-radius:24px;
  background:var(--s1);border:1px solid var(--b2);
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 60px rgba(200,144,42,.12),0 32px 80px rgba(0,0,0,.4);
}
.ob-logo-name{
  font-size:32px;font-weight:700;letter-spacing:-1.8px;
  background:linear-gradient(135deg,#7a9abf 0%,#c8902a 100%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
}
.ob-msgs{
  width:100%;display:flex;flex-direction:column;gap:10px;align-items:flex-start;
}
.ob-bubble{
  background:var(--s1);border:1px solid var(--b2);
  border-radius:20px 20px 20px 5px;
  padding:14px 18px;font-size:17px;font-weight:300;line-height:1.5;
  max-width:90%;
  opacity:0;transform:translateY(10px) scale(.97);
  transition:opacity .3s var(--smooth), transform .35s var(--spring);
}
.ob-bubble.in{opacity:1;transform:none}
.ob-user-bubble{
  align-self:flex-end;
  border-radius:20px 20px 5px 20px;
  background:rgba(200,144,42,.12);border-color:rgba(200,144,42,.25);
}
.ob-dots span{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:var(--t2);margin:0 2px;
  animation:dot .9s ease-in-out infinite;
}
.ob-dots span:nth-child(2){animation-delay:.2s}
.ob-dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-5px);opacity:1}}

.ob-bottom{width:100%;max-width:380px;display:flex;flex-direction:column;gap:10px}
.ob-input-row{
  display:flex;gap:10px;align-items:center;
  opacity:0;transform:translateY(12px);
  transition:opacity .3s var(--smooth),transform .35s var(--spring);
}
.ob-input-row.in{opacity:1;transform:none}
.ob-input{
  flex:1;background:var(--s1);border:1.5px solid var(--b2);
  border-radius:var(--rL);padding:16px 20px;font-size:17px;
  font-weight:300;color:var(--t1);
  transition:border-color .2s;
}
.ob-input:focus{border-color:rgba(200,144,42,.5)}
.ob-input::placeholder{color:var(--t3)}
.ob-send{
  width:52px;height:52px;flex-shrink:0;border-radius:var(--rL);
  background:linear-gradient(135deg,#c8902a,#a07018);
  color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 20px rgba(200,144,42,.4);
  transition:transform .2s var(--spring),opacity .2s;
}
.ob-send:active{transform:scale(.88);opacity:.85}
.ob-cta{
  display:none;width:100%;padding:18px;border-radius:var(--rL);
  background:linear-gradient(135deg,#c8902a,#a07018);
  color:#fff;font-size:17px;font-weight:600;cursor:pointer;
  box-shadow:0 10px 36px rgba(200,144,42,.4);
  opacity:0;transform:translateY(14px);
  transition:opacity .35s var(--smooth),transform .4s var(--spring);
}
.ob-cta.in{opacity:1;transform:none}
.ob-cta:active{transform:scale(.97)}

/* ─── APP SHELL ──────────────────────────────────── */
#app{
  display:none;height:100dvh;height:-webkit-fill-available;
  flex-direction:column;max-width:480px;margin:0 auto;
  position:relative;overflow:hidden;
  -webkit-overflow-scrolling:touch;
}
#app.on{display:flex}

/* ─── HEADER ─────────────────────────────────────── */
.hdr{
  flex-shrink:0;padding-top:var(--st);
  background:var(--bg);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid var(--b1);
  position:relative;z-index:200;
}
.hdr-top{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 20px 10px;
}
.hdr-logo-svg{ display:block; flex-shrink:0; }
.hdr-logo-btn{
  background:none;border:none;padding:4px;cursor:pointer;
  border-radius:10px;display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--spring);
  -webkit-tap-highlight-color:transparent;
}
.hdr-logo-btn:active{transform:scale(.88)}

/* ─── DATA MENU ──────────────────────────────────── */
#dataMenu{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:1000;
  display:none;align-items:flex-start;justify-content:flex-start;
}
#dataMenu.on{display:flex}
#dataMenuBackdrop{
  position:absolute;inset:0;
}
#dataMenuCard{
  position:absolute;
  top:calc(var(--st) + 58px);left:16px;
  background:var(--s2);border:1px solid var(--b2);
  border-radius:16px;padding:6px;
  min-width:190px;
  box-shadow:0 8px 32px rgba(0,0,0,.4);
  animation:menuIn .22s var(--spring-s);
}
@keyframes menuIn{
  from{opacity:0;transform:translateY(-8px) scale(.96)}
  to{opacity:1;transform:none}
}
.dmenu-item{
  display:flex;align-items:center;gap:12px;
  padding:11px 14px;border-radius:11px;
  cursor:pointer;color:var(--t1);
  transition:background .15s;
  font-size:14px;font-weight:400;
}
.dmenu-item:active{background:var(--s3)}
.dmenu-item .ms{font-size:20px;color:var(--t2)}
.dmenu-sep{height:1px;background:var(--b1);margin:4px 0}
.hdr-btn{
  width:38px;height:38px;border-radius:12px;
  background:var(--s1);border:1px solid var(--b1);
  color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--spring),background .15s;
}
.hdr-btn:active{transform:scale(.88);background:var(--s2)}
.hdr-btn .ms{font-size:22px}
.month-nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 14px 13px;
}
.m-arrow{
  width:44px;height:44px;border-radius:14px;
  background:transparent;border:none;
  color:var(--t2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .2s var(--spring),color .15s;
}
.m-arrow:active{transform:scale(.82);color:var(--t1)}
.m-arrow .ms{font-size:26px}
.m-label{
  font-size:13px;font-weight:600;color:var(--t2);
  letter-spacing:2.5px;text-transform:uppercase;
}

/* ─── SCROLL CONTAINER ───────────────────────────── */
.scroll{
  flex:1;overflow-y:auto;overflow-x:hidden;
  position:relative;will-change:transform;
}

/* ─── HERO ───────────────────────────────────────── */
.hero{
  padding:28px 20px 20px;
  text-align:center;
}
.bal-lbl{
  font-size:11px;font-weight:600;color:var(--t3);
  letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px;
}
.bal-num{
  font-family:'Playfair Display',serif;
  font-size:64px;font-weight:400;letter-spacing:-.5px;line-height:1.02;
  margin-bottom:24px;
  transition:color .4s var(--smooth);
}
.bal-pos{color:var(--green)}
.bal-neg{color:var(--red)}
.bal-zero{color:var(--t3)}

/* two-col summary */
.summary{
  display:grid;grid-template-columns:1fr 1px 1fr;
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--rL);
  overflow:hidden;margin-bottom:14px;
}
.summary-div{background:var(--b1);margin:16px 0}
.sum-col{
  padding:18px 14px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  transition:background .18s;
}
.sum-col:active{background:var(--s2)}
.sum-lbl{font-size:10px;font-weight:600;color:var(--t3);letter-spacing:1.8px;text-transform:uppercase}
.sum-val{font-size:22px;font-weight:300;letter-spacing:-.5px}
.sum-list{width:100%;margin-top:4px;display:flex;flex-direction:column;gap:3px}
.sum-item{
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;padding:2px 0;
  transition:opacity .15s;
}
.sum-item:active{opacity:.6}
.sum-item-name{font-size:10px;color:var(--t3);font-weight:300;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55%}
.sum-item-amt{font-size:10px;color:var(--t2);font-weight:400;flex-shrink:0}
.sum-add{font-size:10px;color:var(--t3);text-align:center;margin-top:2px}
.sum-hint{font-size:10px;color:var(--t3);font-weight:300;margin-top:4px;text-align:center}

/* savings pill */
.sav-pill{
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(94,234,212,.06);
  border:1px solid rgba(94,234,212,.14);
  border-radius:var(--rL);padding:14px 18px;cursor:pointer;
  transition:background .2s,transform .2s var(--spring);
}
.sav-pill:active{background:rgba(94,234,212,.1);transform:scale(.98)}
.sav-left{display:flex;align-items:center;gap:10px}
.sav-dot{width:9px;height:9px;border-radius:50%;background:var(--ahorros);flex-shrink:0}
.sav-info{display:flex;flex-direction:column;gap:1px;text-align:left}
.sav-title{font-size:13px;font-weight:500;color:var(--t2)}
.sav-sub{font-size:11px;color:var(--t3)}
.sav-right{text-align:right}
.sav-amt{font-size:12px;color:var(--t3);margin-top:1px}

/* ─── AMOA MESSAGE ───────────────────────────────── */
.amoa-msg{
  margin:0 20px 4px;
  display:flex;align-items:flex-start;gap:10px;
  padding:13px 15px;
  background:var(--s1);border:1px solid var(--b1);border-radius:var(--rL);
}
.amoa-icon{
  width:28px;height:28px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
  margin-top:1px;
}
.amoa-text{font-size:13px;font-weight:300;color:var(--t2);line-height:1.55}
.amoa-text b{font-weight:500;color:var(--t1)}

/* ─── PROFILE CHIPS ──────────────────────────────── */
.chips{
  display:flex;flex-direction:column;gap:8px;padding:10px 20px 2px;
}
.chip{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;border-radius:22px;
  border:1px solid;cursor:pointer;width:100%;
  transition:transform .22s var(--spring),opacity .18s,background .18s;
}
.chip:active{transform:scale(.97);opacity:.85}
.chip-left{display:flex;align-items:center;gap:10px}
.chip-bar{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.chip-name{font-size:14px;font-weight:500}
.chip-right{display:flex;align-items:baseline;gap:10px}
.chip-pct{font-size:13px;font-weight:400;opacity:.55;margin-top:2px}
.chip-amt{font-size:22px;font-weight:300;letter-spacing:-.8px}

/* ─── CONTENT ────────────────────────────────────── */
.content{padding:8px 20px calc(100px + var(--sb))}
.sec{margin-top:26px}
.sec-hd{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:12px;
}
.sec-lbl{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:2px;text-transform:uppercase}
.sec-amt{font-size:16px;font-weight:600;color:var(--t1);letter-spacing:-.3px}

/* ─── FIXED LIST ─────────────────────────────────── */
.card{
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--rL);overflow:hidden;
}
.row{
  display:flex;align-items:center;padding:14px 16px;
  border-bottom:1px solid var(--b1);cursor:pointer;
  transition:background .18s;
  min-height:64px;
}
.row:last-child{border-bottom:none}
.row:active{background:var(--s2)}
.avatar{
  width:3px;height:36px;border-radius:2px;
  flex-shrink:0;margin-right:14px;
}
.avatar.is-emoji{
  width:42px;height:42px;border-radius:13px;
  background:var(--s2) !important;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;margin-right:14px;
}
.row-info{flex:1;min-width:0}
.row-name{font-size:15px;font-weight:400;letter-spacing:-.2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:12px;font-weight:300;color:var(--t3);margin-top:2px}
.row-amt{font-size:15px;font-weight:300;color:var(--t2);
  flex-shrink:0;margin-left:10px;letter-spacing:-.3px}

/* ─── VAR ROWS ───────────────────────────────────── */
.vrow{
  display:flex;align-items:center;padding:14px 16px;
  background:var(--s1);border:1px solid var(--b1);
  border-radius:var(--r);margin-bottom:7px;cursor:pointer;
  overflow:hidden;position:relative;
  transition:opacity .18s,background .15s;min-height:62px;
}
.vrow:active{opacity:.65;background:var(--s2)}
.vrow-bar{
  width:3px;height:36px;border-radius:2px;
  flex-shrink:0;margin-right:14px;opacity:.7;
}
.vrow-info{flex:1;min-width:0}
.vrow-name{font-size:15px;font-weight:400;letter-spacing:-.2px}
.vrow-profile{font-size:11px;font-weight:500;margin-top:2px}
.vrow-amt{font-size:15px;font-weight:300;color:var(--t2);
  flex-shrink:0;margin-left:10px;letter-spacing:-.3px}

/* ─── ADD BUTTON ─────────────────────────────────── */
.add-row{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;margin-top:8px;
  border-radius:var(--rL);cursor:pointer;
  border:1.5px dashed var(--b2);background:transparent;
  color:var(--t3);font-size:14px;font-weight:400;
  transition:all .2s var(--spring);
}
.add-row:active{background:var(--s1);border-style:solid;transform:scale(.98)}
.add-row .ms{font-size:20px}

/* ─── MODALS ─────────────────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.65);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:var(--sb);
  opacity:0;pointer-events:none;
  transition:opacity .22s var(--smooth);
}
.overlay.on{opacity:1;pointer-events:auto}
.sheet{
  width:100%;max-width:480px;
  background:var(--s1);
  border-radius:var(--rXL) var(--rXL) 0 0;
  border:1px solid var(--b2);border-bottom:none;
  max-height:92dvh;display:flex;flex-direction:column;
  /* spring sheet entry */
  animation:sheetIn .42s var(--spring-s);
}
@keyframes sheetIn{
  from{transform:translateY(110%);opacity:.4}
  to{transform:translateY(0);opacity:1}
}
.sheet-pull{
  width:40px;height:4px;border-radius:2px;
  background:var(--b2);margin:12px auto 0;flex-shrink:0;
}
.sheet-hd{
  padding:16px 22px 15px;
  border-bottom:1px solid var(--b1);
  font-size:17px;font-weight:600;letter-spacing:-.3px;
  flex-shrink:0;
}
.sheet-body{
  padding:20px 22px;display:flex;flex-direction:column;
  gap:16px;overflow-y:auto;flex:1;
}
.sheet-foot{padding:0 22px 16px;display:flex;gap:10px;flex-shrink:0}
.sheet-del{padding:0 22px 12px;flex-shrink:0}

/* ─── FORM FIELDS ────────────────────────────────── */
.f-lbl{
  font-size:11px;font-weight:600;color:var(--t3);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px;
}
.f-in{
  width:100%;background:var(--s2);border:1.5px solid var(--b1);
  border-radius:var(--rL);padding:15px 18px;
  font-size:17px;font-weight:300;color:var(--t1);
  transition:border-color .2s,background .2s;
}
.f-in:focus{border-color:rgba(200,144,42,.5);background:var(--s3)}
.f-in::placeholder{color:var(--t3)}

/* profile grid */
.prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.prof-opt{
  padding:13px 14px;border-radius:var(--r);
  border:1.5px solid var(--b1);background:var(--s2);
  cursor:pointer;display:flex;align-items:center;gap:10px;
  transition:all .2s var(--spring);
  min-height:52px;
}
.prof-opt:active{transform:scale(.94)}

/* ─── TOAST ──────────────────────────────────────── */
.toast{
  position:fixed;z-index:800;
  bottom:calc(80px + var(--sb));
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--s2);border:1px solid var(--b2);

  font-size:14px;font-weight:400;color:var(--t1);

  transition:opacity .28s var(--smooth), transform .32s var(--spring);
}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── ANIMATIONS ─────────────────────────────────── */
/* page content entrance */
@keyframes fadeUp{
  from{opacity:0;transform:translateY(18px)}
  to  {opacity:1;transform:translateY(0)}
}
/* row cascade */
@keyframes rowIn{
  from{opacity:0;transform:translateX(-10px)}
  to  {opacity:1;transform:translateX(0)}
}
/* number change pulse */
@keyframes numPulse{

  40% {transform:scale(1.06)}

}
.hero{animation:fadeUp .4s var(--smooth) both}

<script>
'use strict';

/* ─── CONSTANTS ──────────────────────────────────── */
const MONTHS = ['ENERO','FEBRERO','MARZO','ABRIL','MAYO','JUNIO',
                'JULIO','AGOSTO','SEPTIEMBRE','OCTUBRE','NOVIEMBRE','DICIEMBRE'];
const KEY = 'amoa-v8';

const PROFILES = [
  {id:'casa',     name:'Casa',     color:'#c8902a', rgb:'200,144,42'},
  {id:'personal', name:'Personal', color:'#6a9878', rgb:'106,152,120'},
  {id:'pareja',   name:'Pareja',   color:'#e8b860', rgb:'232,184,96'},
];
const SAV_PROF = {id:'ahorros', name:'Ahorros', color:'#c8902a', rgb:'200,144,42'};

const DEFAULT_FIXED = [
  {name:'🏠 Arriendo',        amount:0},
  {name:'⚡ Electricidad',    amount:0},
  {name:'💧 Agua',            amount:0},
  {name:'📡 Internet',        amount:0},
  {name:'🛒 Mercado',         amount:0},
  {name:'🏢 Gasto Común',     amount:0},
  {name:'📱 Plan Móvil Euri', amount:0},
  {name:'📞 Plan Móvil Fran', amount:0},
  {name:'🥬 Feria 1',         amount:0},
  {name:'🥕 Feria 2',         amount:0},
  {name:'📺 YouTube',         amount:0},
  {name:'☁️ Google One',      amount:0},
  {name:'📦 Amazon Prime',    amount:0},
  {name:'🫧 Botellones',      amount:0},
  {name:'🥚 Huevos',          amount:0},
  {name:'🍎 Apple TV',        amount:0}
];

const ENERO_DATA = {
  incomes: [
    {name:'Fran',  amount:500000},
    {name:'Euri',  amount:500000},
  ],
  savings: [],
  fixed: [
    {name:'🏠 Arriendo',        amount:300000},
    {name:'⚡ Electricidad',    amount:21811},
    {name:'💧 Agua',            amount:12920},
    {name:'📡 Internet',        amount:23996},
    {name:'🛒 Mercado',         amount:300000},
    {name:'🏢 Gasto Común',     amount:34156},
    {name:'📱 Plan Móvil Euri', amount:25119},
    {name:'📞 Plan Móvil Fran', amount:11676},
    {name:'🥬 Feria 1',         amount:35000},
    {name:'🥕 Feria 2',         amount:20000},
    {name:'📺 YouTube',         amount:11000},
    {name:'☁️ Google One',      amount:2690},
    {name:'📦 Amazon Prime',    amount:6490},
    {name:'🫧 Botellones',      amount:0},
    {name:'🥚 Huevos',          amount:0},
    {name:'🍎 Apple TV',        amount:0},
  ],
  vars: [
    {name:'Pan de Jamón 31',  amount:17000,  profile:'casa'},
    {name:'Otro',             amount:19500,  profile:'casa'},
    {name:'Otro',             amount:3200,   profile:'casa'},
    {name:'Sopa 1 Enero',     amount:23658,  profile:'casa'},
    {name:'Bolsas 3 Enero',   amount:4670,   profile:'casa'},
    {name:'Art. Limpieza',    amount:11270,  profile:'casa'},
    {name:'Pastilla Mamá',    amount:13189,  profile:'casa'},
    {name:'Atún',             amount:10080,  profile:'casa'},
    {name:'Queso 11/01',      amount:1840,   profile:'casa'},
    {name:'Otro',             amount:4237,   profile:'casa'},
    {name:'Otro',             amount:7199,   profile:'casa'},
    {name:'Otro',             amount:2000,   profile:'casa'},
    {name:'Q Llanero',        amount:4630,   profile:'casa'},
    {name:'Harina Yogurt',    amount:2500,   profile:'casa'},
    {name:'Agua Potable',     amount:5000,   profile:'casa'},
  ]
};

/* ─── STATE ──────────────────────────────────────── */
const n = new Date();
let CY = n.getFullYear(), CM = n.getMonth();
let DATA;
try { DATA = JSON.parse(localStorage.getItem(KEY) || 'null'); } catch(_){}
if (!DATA?.years) DATA = {nick:'', years:{}};

let editProfile = 'casa';
let editIncomeIdx = null, editSavingIdx = null;
let editFixedIdx  = null, editVarIdx    = null;

/* ─── DATA ───────────────────────────────────────── */
function month(y, m) {
  if (!DATA.years[y]) DATA.years[y] = {};
  if (!DATA.years[y][m]) {
    const isEnero = (y === 2026 && m === 0);
    DATA.years[y][m] = isEnero
      ? JSON.parse(JSON.stringify(ENERO_DATA))
      : { incomes:[], savings:[], fixed: JSON.parse(JSON.stringify(DEFAULT_FIXED)), vars:[] };
  }
  return DATA.years[y][m];
}

function persist() { localStorage.setItem(KEY, JSON.stringify(DATA)); }

function totals(y, m) {
  const d = month(y, m);
  const income      = d.incomes.reduce((s,e) => s + (e.amount||0), 0);
  const saving      = d.savings.reduce((s,e) => s + (e.amount||0), 0);
  const fixed       = d.fixed.reduce  ((s,e) => s + (e.amount||0), 0);
  const casaVars    = d.vars.filter(e => e.profile === 'casa'    ).reduce((s,e) => s + (e.amount||0), 0);
  const personalVars= d.vars.filter(e => e.profile === 'personal').reduce((s,e) => s + (e.amount||0), 0);
  const parejaVars  = d.vars.filter(e => e.profile === 'pareja'  ).reduce((s,e) => s + (e.amount||0), 0);
  const vars        = d.vars.reduce((s,e) => s + (e.amount||0), 0);
  // Balance = Ingresos - Gastos Fijos - Gastos Casa
  // Personal y Pareja son informativos, no descuentan
  const expense = fixed + casaVars;
  const balance = income - expense;
  const savePct = income > 0 ? (saving / income * 100) : 0;
  return {income, saving, fixed, vars, casaVars, personalVars, parejaVars, expense, balance, savePct};
}

/* ─── FORMAT ─────────────────────────────────────── */
function fmt(n) { return '$' + Math.round(n||0).toLocaleString('es-CL'); }
function parseAmt(s) { return parseFloat(String(s).replace(/\./g,'').replace(',','.')) || 0; }

// Separa el primer emoji (si existe) del resto del nombre
function splitEmoji(str) {
  if (!str) return {emoji:'', label:''};
  // Regex que captura el primer carácter emoji
  const m = str.match(/^(\p{Emoji_Presentation}|\p{Extended_Pictographic})\s*/u);
  if (m) return {emoji: m[1], label: str.slice(m[0].length).trim()};
  return {emoji:'', label: str.trim()};
}

// Construye el avatar: emoji grande o inicial con color
function buildAvatar(name, color, rgb) {
  const {emoji, label} = splitEmoji(name);
  if (emoji) {
    return `<div class="avatar is-emoji">${emoji}</div>`;
  }
  return `<div class="avatar" style="background:${color}"></div>`;
}
function fmtInput(el) {
  const raw = el.value.replace(/\D/g,'');
  el.value = raw ? parseInt(raw,10).toLocaleString('es-CL') : '';
}

/* ─── RENDER ─────────────────────────────────────── */
function render() {
  const md = month(CY, CM);
  const t  = totals(CY, CM);

  // Month label
  document.getElementById('mLabel').textContent = `${MONTHS[CM]} ${CY}`;

  // Balance — sin símbolo $
  const bn = document.getElementById('balNum');
  const newBal = Math.round(t.balance||0).toLocaleString('es-CL');
  if (bn.textContent !== newBal) {
    bn.textContent = newBal;
    bn.className = 'bal-num ' + (t.balance > 0 ? 'bal-pos' : t.balance < 0 ? 'bal-neg' : 'bal-zero');

  incVal.textContent = fmt(t.income);
  incVal.style.color = 'var(--green)';
  expVal.textContent = fmt(t.expense);
  expVal.style.color = 'var(--red)';


  // Savings pill
  document.getElementById('savAmt').textContent = fmt(t.saving);

  // Amoa message
  renderAmoa(t, md);

  // Chips
  renderChips(md);

  // Fixed list
  document.getElementById('fixedTotal').textContent = fmt(t.fixed);
  const fl = document.getElementById('fixedList');
  if (md.fixed.length === 0) {
    fl.innerHTML = `<div style="padding:18px;text-align:center;color:var(--t3);font-size:14px">Sin gastos fijos</div>`;
  } else {
    fl.innerHTML = md.fixed.map((e, i) => {
      const pct = t.expense > 0 ? (e.amount/t.expense*100).toFixed(1) : '0.0';
      const {label} = splitEmoji(e.name);
      const displayName = label || e.name;
      return `<div class="row" onclick="openEditFixed(${i})" style="animation-delay:${i*35}ms">
        ${buildAvatar(e.name, '#c8902a', '200,144,42')}
        <div class="row-info">
          <div class="row-name">${displayName}</div>
          <div class="row-sub">${pct}% del total</div>
        </div>
        <div class="row-amt">${fmt(e.amount)}</div>
      </div>`;
    }).join('');
  }

  // Var list
  document.getElementById('varTotal').textContent = fmt(t.vars);
  const vl = document.getElementById('varList');
  if (md.vars.length === 0) {
    vl.innerHTML = `<div style="padding:8px 0 4px;text-align:center;color:var(--t3);font-size:14px">Nada por aquí todavía</div>`;
  } else {
    vl.innerHTML = md.vars.map((e, i) => {
      const p = PROFILES.find(x => x.id === e.profile) || PROFILES[0];
      return `<div class="vrow" style="animation-delay:${i*35}ms" onclick="openEditVar(${i})">
        <div class="vrow-bar" style="background:${p.color}"></div>
        <div class="vrow-info">
          <div class="vrow-name">${e.name}</div>
          <div class="vrow-profile" style="color:${p.color}">${p.name}</div>
        </div>
        <div class="vrow-amt">${fmt(e.amount)}</div>
      </div>`;
    }).join('');
  }
}

function renderAmoa(t, md) {
  const nick = DATA.nick ? `, <b>${DATA.nick}</b>` : '';
  let msg;
  if (t.income === 0) {
    msg = `¿Cómo va el mes${nick}? Toca <b>Ingresos</b> para empezar.`;
  } else if (t.balance > 0 && t.savePct >= 20) {
    msg = `Muy bien${nick}. Estás ahorrando el ${t.savePct.toFixed(0)}% de lo que ganas.`;
  } else if (t.balance > 0) {
    msg = `Vas bien${nick}. Te sobran ${fmt(t.balance)} este mes.`;
  } else if (t.balance < 0) {
    msg = `Este mes está apretado${nick}. Respira — lo vemos juntos con calma.`;
  } else {
    msg = `Justo en cero${nick}. Sin margen ni déficit.`;
  }
  document.getElementById('amoaText').innerHTML = msg;
}

/* ─── THEME ──────────────────────────────────────── */
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  const next = isLight ? 'dark' : 'light';

  // Forzar transición en todos los elementos con color inline
  const TRANS = 'color 220ms ease-out, background-color 220ms ease-out, background 220ms ease-out';
  document.querySelectorAll('[style*="color"], [style*="background"]').forEach(el => {
    el.style.transition = TRANS;
  });

  html.classList.add('theme-transitioning');
  html.setAttribute('data-theme', next);
  document.getElementById('themeIcon').textContent = next === 'light' ? 'dark_mode' : 'light_mode';
  localStorage.setItem('amoa-theme', next);
  applyThemeProfiles(next);
  render();

  setTimeout(() => {
    html.classList.remove('theme-transitioning');
    // Limpiar transiciones inline para no interferir con animaciones normales
    document.querySelectorAll('[style*="transition"]').forEach(el => {
      el.style.transition = '';
    });
  }, 280);
}
function initTheme() {
  const saved = localStorage.getItem('amoa-theme') || 'light';
  document.documentElement.setAttribute('data-theme', saved);
  const icon = document.getElementById('themeIcon');
  if (icon) icon.textContent = saved === 'light' ? 'dark_mode' : 'light_mode';
  applyThemeProfiles(saved);
}
function applyThemeProfiles(theme) {
  // Only apply defaults if user hasn't set custom colors
  const overrides = JSON.parse(localStorage.getItem('amoa-colors') || '{}');
  const lightDefaults = {
    casa:     {hex:'#4A4644', rgb:'74,70,68'},
    personal: {hex:'#9E9488', rgb:'158,148,136'},
    pareja:   {hex:'#B8B2AA', rgb:'184,178,170'},
    ahorros:  {hex:'#C86010', rgb:'200,96,16'},
  };
  const darkDefaults = {
    casa:     {hex:'#c8902a', rgb:'200,144,42'},
    personal: {hex:'#6a9878', rgb:'106,152,120'},
    pareja:   {hex:'#e8b860', rgb:'232,184,96'},
    ahorros:  {hex:'#c8902a', rgb:'200,144,42'},
  };
  const defaults = theme === 'light' ? lightDefaults : darkDefaults;
  PROFILES.forEach(p => {
    if (!overrides[p.id]) {
      p.color = defaults[p.id].hex;
      p.rgb   = defaults[p.id].rgb;
    }
  });
  if (!overrides['ahorros']) {
    SAV_PROF.color = defaults.ahorros.hex;
    SAV_PROF.rgb   = defaults.ahorros.rgb;
  }
}

/* ─── SWIPE ──────────────────────────────────────── */
(function(){
  let sx=0, sy=0, startScrollY=0, phase='idle', locked=false, t0=0;

  function sc() { return document.getElementById('mainScroll'); }

  document.addEventListener('touchstart', e => {
    if (locked) return;
    sx = e.touches[0].clientX;
    sy = e.touches[0].clientY;
    startScrollY = sc().scrollTop;
    phase = 'idle'; t0 = Date.now();
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (locked || phase === 'scroll') return;
    const dx = e.touches[0].clientX - sx;
    const dy = e.touches[0].clientY - sy;
    if (phase === 'idle') {
      if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
      if (Math.abs(dy) > Math.abs(dx)) { phase = 'scroll'; return; }
      phase = 'swipe';
    }
    if (phase === 'swipe') {
      // Follow finger with rubber-band damping
      const pull = dx * 0.42;
      const fade = 1 - Math.abs(dx) / window.innerWidth * 0.5;
      sc().style.transform = `translateX(${pull}px)`;
      sc().style.opacity   = String(Math.max(0.4, fade));
    }
  }, {passive:true});

  document.addEventListener('touchend', e => {
    if (locked || phase !== 'swipe') { phase='idle'; return; }
    const dx = e.changedTouches[0].clientX - sx;
    const dt = Date.now() - t0;
    const vel = Math.abs(dx) / dt; // px/ms
    const commit = Math.abs(dx) > 68 || vel > 0.45;
    const s = sc();

    if (!commit) {
      // Snap back with spring
      s.style.transition = 'transform .35s var(--spring-s), opacity .35s var(--smooth)';
      s.style.transform = ''; s.style.opacity = '';
      s.addEventListener('transitionend', () => { s.style.transition=''; }, {once:true});
      phase = 'idle'; return;
    }

    // Commit: slide out → change → slide in
    locked = true;
    const dir = dx < 0 ? 1 : -1;
    const outX = dir === 1 ? '-105%' : '105%';

    s.style.transition = 'transform .26s var(--sharp), opacity .26s var(--smooth)';
    s.style.transform  = `translateX(${outX})`;
    s.style.opacity    = '0';

    setTimeout(() => {
      s.style.transition = 'none';
      s.style.transform  = '';
      s.style.opacity    = '';
      changeMonth(dir);

      // Force re-entrance
      ['.hero','.amoa-msg','.chips','.content'].forEach(sel => {
        const el = s.querySelector(sel);
        if (!el) return;
        el.style.animation = 'none';
        void el.offsetWidth;
        el.style.animation = '';
      });

      locked = false; phase = 'idle';
    }, 270);

  }, {passive:true});
})();

/* ─── SHEET SWIPE TO DISMISS ─────────────────────── */
(function(){
  let sy = 0, dy = 0, dragging = false, t0 = 0;
  let activeSheet = null, activeOverlay = null;

  function getSheet(el) {
    // Walk up to find a .sheet inside an .overlay.on
    let node = el;
    while (node && node !== document.body) {
      if (node.classList && node.classList.contains('sheet')) return node;
      node = node.parentElement;
    }
    return null;
  }

  document.addEventListener('touchstart', e => {
    const sheet = getSheet(e.target);
    if (!sheet) return;
    const overlay = sheet.closest('.overlay');
    if (!overlay || !overlay.classList.contains('on')) return;
    // Don't hijack if touching a scrollable area that has scrolled content
    const scrollable = e.target.closest('.sheet-body, #colorPicker');
    if (scrollable && scrollable.scrollTop > 0) return;

    activeSheet = sheet;
    activeOverlay = overlay;
    sy = e.touches[0].clientY;
    dy = 0;
    dragging = false;
    t0 = Date.now();
  }, {passive:true});

  document.addEventListener('touchmove', e => {
    if (!activeSheet) return;
    const currentY = e.touches[0].clientY;
    dy = currentY - sy;
    if (dy < 0) { dy = 0; return; } // no pull up
    dragging = true;

    // Rubber-band: full drag at start, slow down as it goes
    const pull = dy > 0 ? Math.pow(dy, 0.85) : 0;
    activeSheet.style.transition = 'none';
    activeSheet.style.transform  = `translateY(${pull}px)`;
    const fade = Math.max(0, 1 - dy / 400);
    if (activeOverlay) activeOverlay.style.opacity = String(fade);
  }, {passive:true});

  document.addEventListener('touchend', e => {
    if (!activeSheet || !dragging) { activeSheet = null; activeOverlay = null; return; }
    const vel = dy / (Date.now() - t0); // px/ms
    const commit = dy > 120 || vel > 0.5;

    if (!commit) {
      // Snap back
      activeSheet.style.transition = 'transform .38s var(--spring-s)';
      activeSheet.style.transform  = '';
      if (activeOverlay) { activeOverlay.style.transition = 'opacity .28s var(--smooth)'; activeOverlay.style.opacity = ''; }
      activeSheet.addEventListener('transitionend', () => {
        if (activeSheet) { activeSheet.style.transition = ''; }
        if (activeOverlay) { activeOverlay.style.transition = ''; }
      }, {once:true});
    } else {
      // Dismiss
      const sheet = activeSheet;
      const overlay = activeOverlay;
      const h = sheet.offsetHeight;
      sheet.style.transition = 'transform .32s var(--sharp), opacity .28s var(--smooth)';
      sheet.style.transform  = `translateY(${h + 40}px)`;
      sheet.style.opacity    = '0';
      if (overlay) {
        overlay.style.transition = 'opacity .30s var(--smooth)';
        overlay.style.opacity    = '0';
      }
      setTimeout(() => {
        overlay.classList.remove('on');
        sheet.style.transition = '';
        sheet.style.transform  = '';
        sheet.style.opacity    = '';
        if (overlay) { overlay.style.transition = ''; overlay.style.opacity = ''; overlay.style.background = ''; }
      }, 320);
    }

    activeSheet = null; activeOverlay = null; dragging = false; dy = 0;
  }, {passive:true});
})();

/* ─── ONBOARDING ─────────────────────────────────── */
function obBubble(html, delay=0) {
  return new Promise(res => {
    setTimeout(() => {
      const msgs = document.getElementById('obMsgs');
      const b = document.createElement('div');
      b.className = 'ob-bubble';
      b.innerHTML = '<span class="ob-dots"><span></span><span></span><span></span></span>';
      msgs.appendChild(b);
      msgs.scrollTop = msgs.scrollHeight;
      requestAnimationFrame(() => requestAnimationFrame(() => b.classList.add('in')));
      setTimeout(() => { b.innerHTML = html; res(); }, 480);
    }, delay);
  });
}
function obUserBubble(text) {
  const msgs = document.getElementById('obMsgs');
  const b = document.createElement('div');
  b.className = 'ob-bubble ob-user-bubble in';
  b.textContent = text;
  msgs.appendChild(b);
  msgs.scrollTop = msgs.scrollHeight;
}
async function obSend() {
  const inp = document.getElementById('obInput');
  const val = inp.value.trim();
  if (!val) return;
  document.getElementById('obInputRow').classList.remove('in');
  obUserBubble(val);
  DATA.nick = val.split(' ')[0];
  persist();
  await obBubble(`Bienvenid@, <b>${DATA.nick}</b> 👋`, 100);
  await obBubble('Tus datos viven solo aquí, en tu dispositivo.', 200);
  setTimeout(() => {
    const cta = document.getElementById('obCta');
    cta.style.display = 'block';
    requestAnimationFrame(() => requestAnimationFrame(() => cta.classList.add('in')));
  }, 700);
}
function obFinish() {
  const ob = document.getElementById('ob');
  ob.style.transition = 'opacity .3s, transform .3s';
  ob.style.opacity = '0'; ob.style.transform = 'scale(1.03)';
  setTimeout(() => {
    ob.style.display = 'none';
    const app = document.getElementById('app');
    app.classList.add('on');
    initTheme();
    render();
  }, 300);
  localStorage.setItem('amoa-ob', '1');
}
async function startOb() {
  setTimeout(() => document.getElementById('obLogo').classList.add('in'), 120);
  await obBubble('Hola. Soy Amoa.', 500);
  await obBubble('¿Cómo te llamas?', 1000);
  setTimeout(() => {
    document.getElementById('obInputRow').classList.add('in');
    setTimeout(() => document.getElementById('obInput').focus(), 200);
  }, 300);
  document.getElementById('obInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') obSend();
  });
}

let _colorPickerPid = null;

function toggleColorPicker() {
  const el = document.getElementById('colorPicker');
  if (el.classList.contains('on')) { el.classList.remove('on'); return; }
  buildColorPicker();
  el.classList.add('on');
}

function buildColorPicker() {
  const pid = _colorPickerPid;
  const currentColor = pid === 'ahorros'
    ? SAV_PROF.color
    : (PROFILES.find(x => x.id === pid)?.color || '');
  const sections = [
    {label:'Paleta sala',  from:'#1E1E1E', to:'#EDE9E2'},
    {label:'Crepúsculo',   from:'#c8902a', to:'#1a2640'},
    {label:'Colores',      from:'#e53935', to:'#a0a0a0'},
  ];
  const sectionStarts = [0, 6, 11];
  document.getElementById('colorPicker').innerHTML = COLOR_PALETTE.map((c, i) => {
    const sel = c.hex.toLowerCase() === currentColor.toLowerCase() ? 'selected' : '';
    const secIdx = sectionStarts.indexOf(i);
    const header = secIdx >= 0
      ? `<div class="cp-section-label">${sections[secIdx].label}</div>`
      : '';
    return `${header}<div class="cp-item ${sel}" onclick="applyColor('${pid}','${c.hex}','${c.rgb}')">
      <span class="cp-circle" style="background:${c.hex}"></span>
      <span class="cp-label">${c.name}</span>
      <span class="cp-check ms">check</span>
    </div>`;
  }).join('');
}

function applyColor(pid, hex, rgb) {
  if (pid === 'ahorros') { SAV_PROF.color = hex; SAV_PROF.rgb = rgb; }
  else { const p = PROFILES.find(x => x.id === pid); if (p) { p.color = hex; p.rgb = rgb; } }
  const overrides = JSON.parse(localStorage.getItem('amoa-colors') || '{}');
  overrides[pid] = {hex, rgb};
  localStorage.setItem('amoa-colors', JSON.stringify(overrides));
  document.getElementById('dNameText').style.color = hex;
  document.getElementById('dAmt').style.color = hex;
  buildColorPicker();
  render();
}

function loadColorOverrides() {
  const overrides = JSON.parse(localStorage.getItem('amoa-colors') || '{}');
  Object.entries(overrides).forEach(([pid, {hex, rgb}]) => {
    if (pid === 'ahorros') { SAV_PROF.color = hex; SAV_PROF.rgb = rgb; }
    else { const p = PROFILES.find(x => x.id === pid); if (p) { p.color = hex; p.rgb = rgb; } }
  });
}

/* ─── DATA MENU ──────────────────────────────────── */
function toggleDataMenu() {
  const m = document.getElementById('dataMenu');
  m.classList.toggle('on');
}
function closeDataMenu() {
  document.getElementById('dataMenu').classList.remove('on');
}
function exportData() {
  closeDataMenu();
  const payload = {
    version: 1,
    exportedAt: new Date().toISOString(),
    data: localStorage.getItem(KEY),
    theme: localStorage.getItem('amoa-theme'),
    ob: localStorage.getItem('amoa-ob'),
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = `amoa-backup-${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  obBubble('✅ Datos exportados', 0);
}
function importData() {
  closeDataMenu();
  document.getElementById('importFile').value = '';
  document.getElementById('importFile').click();
}
function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const payload = JSON.parse(ev.target.result);
      if (!payload.data) throw new Error('Archivo inválido');
      // Restore
      localStorage.setItem(KEY, payload.data);
      if (payload.theme) localStorage.setItem('amoa-theme', payload.theme);
      if (payload.ob)    localStorage.setItem('amoa-ob', payload.ob);
      obBubble('✅ Datos restaurados', 0);
      setTimeout(() => location.reload(), 1200);
    } catch(_) {
      obBubble('❌ Archivo no válido', 0);
    }
  };
  reader.readAsText(file);
}

/* ─── INIT ───────────────────────────────────────── */
if (localStorage.getItem('amoa-ob')) {
  document.getElementById('ob').style.display = 'none';
  document.getElementById('app').classList.add('on');
  loadColorOverrides();
  initTheme();
  render();
} else {
  loadColorOverrides();
  startOb();
}
